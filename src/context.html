<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查看上下文</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#f5f5f5;
    overflow:hidden;
  }
  .context-container{
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  .context-header{
    padding:12px 16px;
    background:#ff9800;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-shrink:0;
  }
  .context-title{
    font-weight:600;
    font-size:14px;
  }
  .context-close{
    background:rgba(255,255,255,0.2);
    border:none;
    color:#fff;
    width:28px;
    height:28px;
    border-radius:4px;
    cursor:pointer;
    font-size:18px;
  }
  .context-close:hover{background:rgba(255,255,255,0.3);}
  .context-body{
    flex:1;
    overflow-y:auto;
    padding:16px;
  }
  .msg-card{
    background:#fff;
    border:1px solid #e0e0e0;
    border-radius:8px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .msg-card.highlight{
    border-left:4px solid #ff9800;
    background:#fff8e1;
  }
  .msg-header{
    display:flex;
    justify-content:space-between;
    padding:8px 12px;
    background:#f8f8f8;
    border-bottom:1px solid #eee;
    font-size:12px;
  }
  .msg-source{
    color:#666;
  }
  .msg-time{
    color:#999;
  }
  .msg-body{
    padding:12px;
  }
  .msg-content{
    color:#333;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-all;
    font-size:14px;
  }
  .msg-content a{
    color:#1976d2;
    text-decoration:underline;
  }
  .msg-image{
    max-width:100%;
    max-height:150px;
    border-radius:8px;
    margin-top:8px;
  }
  .current-indicator{
    background:#ff9800;
    color:#fff;
    font-size:11px;
    padding:2px 8px;
    border-radius:4px;
    margin-left:8px;
  }
  .loading{
    text-align:center;
    padding:40px;
    color:#999;
  }
  .no-data{
    text-align:center;
    padding:40px;
    color:#999;
  }
</style>
</head>
<body>
<div class="context-container">
  <div class="context-header">
    <div class="context-title">🔍 消息上下文</div>
    <button class="context-close" id="closeBtn">×</button>
  </div>
  <div class="context-body" id="contextBody">
    <div class="loading">加载中...</div>
  </div>
</div>

<script type="module">
const { listen } = window.__TAURI__.event;
const { getCurrentWindow } = window.__TAURI__.window;

let currentMsgId = null;

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeAttr(text) {
  return String(text).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function makeLinksClickable(text) {
  const urlPattern = /((https?:\/\/|www\.)[^\s<>"]+)/gi;
  return text.replace(urlPattern, (url) => {
    let href = url.startsWith('www.') ? 'https://' + url : url;
    try {
      const parsed = new URL(href);
      if (!['http:', 'https:'].includes(parsed.protocol)) return escapeAttr(url);
    } catch(e) {
      return escapeAttr(url);
    }
    return `<a href="${href}" onclick="event.preventDefault(); window.__TAURI__.shell.open('${href}');">${escapeAttr(url)}</a>`;
  });
}

function formatTime(timestamp) {
  if (!timestamp) return '';
  const d = new Date(timestamp * 1000);
  return d.toLocaleString('zh-CN', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
}

function cleanContent(text) {
  if (!text) return '';
  return text.replace(/\u200B/g, '').replace(/[\u200D\uFEFF]/g, '').trim();
}

function renderMessages(messages, currentId) {
  const body = document.getElementById('contextBody');

  if (messages.length === 0) {
    body.innerHTML = '<div class="no-data">没有找到相关消息</div>';
    return;
  }

  body.innerHTML = messages.map(msg => {
    const isCurrent = msg.local_id === currentId;
    const source = msg.group_name || msg.group_id || '未知来源';
    const content = cleanContent(msg.raw_message || msg.message || '');
    const images = msg.images || [];

    return `
      <div class="msg-card ${isCurrent ? 'highlight' : ''}">
        <div class="msg-header">
          <div class="msg-source">
            <span>🏠</span>${escapeHtml(source)}
            ${isCurrent ? '<span class="current-indicator">当前消息</span>' : ''}
          </div>
          <div class="msg-time">${formatTime(msg.time)}</div>
        </div>
        <div class="msg-body">
          <div class="msg-content">${makeLinksClickable(escapeHtml(content))}</div>
          ${images.map(img =>
            `<img class="msg-image" src="${img}" alt="图片" referrerpolicy="no-referrer" crossorigin="anonymous">`
          ).join('')}
        </div>
      </div>
    `;
  }).join('');
}

async function loadContextData(params) {
  const { groupId, currentLocalId } = params;
  currentMsgId = currentLocalId;

  try {
    const messages = await getContextMessages(groupId, currentLocalId);
    renderMessages(messages, currentLocalId);
  } catch(e) {
    console.error('加载上下文失败:', e);
    document.getElementById('contextBody').innerHTML =
      '<div class="no-data">加载失败: ' + escapeHtml(e.message || String(e)) + '</div>';
  }
}

async function getContextMessages(groupId, currentLocalId) {
  const { invoke } = window.__TAURI__.core;
  const messages = await invoke('get_context_messages', {
    groupId: String(groupId),
    currentLocalId: Number(currentLocalId) || 0
  });
  return messages;
}

document.getElementById('closeBtn').addEventListener('click', async () => {
  try {
    await getCurrentWindow().destroy();
  } catch(e) {
    window.close();
  }
});

const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('groupId') || '';
const currentId = parseInt(urlParams.get('currentId')) || 0;
const msgTime = parseInt(urlParams.get('msgTime')) || 0;

listen('context-data', (event) => {
  loadContextData(event.payload);
});

if (groupId && currentId) {
  loadContextData({ groupId, currentLocalId: currentId });
} else {
  document.getElementById('contextBody').innerHTML =
    '<div class="no-data">缺少参数</div>';
}
</script>
</body>
</html>
